org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=false
# Disable Kotlin incremental compilation — required when pub cache (C:) and
# project (D:) are on different Windows drives; cross-drive relative paths crash the daemon.
kotlin.incremental=false
# Kotlin 2.x dropped support for languageVersion < 1.8. Our subprojects block in
# build.gradle.kts forces KotlinCompile tasks to JVM_17 to fix posthog_flutter etc.
# Some plugins still have mismatched Java targets they set themselves — downgrade
# that specific check to a warning so it doesn't block the build.
kotlin.jvm.target.validation.mode=warning
